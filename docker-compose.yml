services:
  autoedu:
    build: .
    image: autoedu:local
    container_name: autoedu
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    # On a home server with the host firewall blocking outbound proxy ports,
    # uncomment the next line so the container shares the host's network namespace
    # (this also lets `TELEGRAM_PROXY_URL=socks5://127.0.0.1:PORT` work).
    # network_mode: host
